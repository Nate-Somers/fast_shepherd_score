# fast_shepherd_score — CPU-only environment with SVML-vectorized numba kernels.
#
# This is a SEPARATE env from the GPU stack (which uses numba>=0.61 / numpy 2.x for
# torch+triton). It exists because the SoA+fp32 CPU kernels (shepherd_score/accel/kernels/
# cpu_soa.py) get a ~2-4.4x speedup on the exp-bound overlap loop ONLY when numba can emit
# Intel SVML vector exp calls. SVML requires the SVML-patched LLVM that ships exclusively in
# the older numba (<=0.59) + icc_rt builds on the `numba` conda channel; numba 0.61+ /
# llvmlite 0.44+ dropped it (config.USING_SVML == False there, even with icc_rt installed).
#
# Verify after install:  python -c "import numba.core.config as c; print(c.USING_SVML)"  -> True
# The fused CPU driver (cpu_fused.py) auto-detects SVML and switches the shape/ESP inner loops
# to fp32 structure-of-arrays kernels; with SVML absent it falls back to the fp64 AoS kernels
# (correct, just slower). NOTE the SoA path is fp32: values agree to ~1e-6 relative, gradients
# to ~1e-4, so enabling SVML changes results slightly as well as speeding them up.
name: fss-cpu-svml
channels:
  - numba
  - conda-forge
dependencies:
  - python=3.10
  - numba=0.59.1        # last numba with the SVML-patched LLVM
  - llvmlite=0.42       # pinned by numba 0.59; SVML-built
  - icc_rt              # numba channel: provides libsvml + enables SVML in llvmlite
  - numpy=1.26          # numba 0.59 caps numpy < 1.27
  - pytorch=*=*cpu*     # CPU build (the container/batch API is torch-based)
  - rdkit               # conformer generation
  - scipy
  # add the remaining fss runtime deps as needed (h5py for ProfileStore screening, etc.)
